name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Chrome package
        run: pnpm build:chrome

      - name: Package Chrome ZIP
        run: |
          mkdir -p release-assets/chrome
          cp -r dist/* release-assets/chrome/
          cd release-assets/chrome
          zip -r "../../TabQuest_v${{ steps.version.outputs.value }}_chrome_build.zip" .

      - name: Build Firefox package
        run: pnpm build:firefox

      - name: Package Firefox ZIP
        run: |
          mkdir -p release-assets/firefox
          cp -r dist/* release-assets/firefox/
          # Custom removal logic for Firefox if needed
          cd release-assets/firefox
          zip -r "../../TabQuest_v${{ steps.version.outputs.value }}_firefox_build.zip" .

      - name: Build Edge package
        run: pnpm build:edge

      - name: Package Edge ZIP
        run: |
          mkdir -p release-assets/edge
          cp -r dist/* release-assets/edge/
          cd release-assets/edge
          zip -r "../../TabQuest_v${{ steps.version.outputs.value }}_edge_build.zip" .

      - name: Package Source Code (for Firefox review)
        run: |
          zip -r "TabQuest_v${{ steps.version.outputs.value }}_source.zip" . -x "node_modules/*" ".git/*" "dist/*" "release-assets/*" "*.zip" ".vscode/*" ".editorconfig" ".gitignore"

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
          artifacts: |
            TabQuest_v${{ steps.version.outputs.value }}_chrome_build.zip
            TabQuest_v${{ steps.version.outputs.value }}_firefox_build.zip
            TabQuest_v${{ steps.version.outputs.value }}_edge_build.zip
            TabQuest_v${{ steps.version.outputs.value }}_source.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Firefox Add-ons
        id: publish-firefox
        continue-on-error: true
        env:
          FIREFOX_ISSUER: ${{ secrets.FIREFOX_ISSUER }}
          FIREFOX_SECRET: ${{ secrets.FIREFOX_SECRET }}
        run: |
          npx web-ext sign \
            --channel listed \
            --source-dir ./release-assets/firefox \
            --upload-source-code TabQuest_v${{ steps.version.outputs.value }}_source.zip \
            --artifacts-dir ./release-assets/firefox-signed \
            --api-key $FIREFOX_ISSUER \
            --api-secret $FIREFOX_SECRET

      - name: Publish to Chrome Web Store
        id: publish-chrome
        continue-on-error: true
        uses: wdzeng/chrome-extension@df7fcb73378f72fc4a6ec29b2cb2ef74a1f23faf # v1
        with:
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          zip-path: TabQuest_v${{ steps.version.outputs.value }}_chrome_build.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}

      - name: Publish to Edge Add-ons
        id: publish-edge
        continue-on-error: true
        uses: wdzeng/edge-addon@b34b7f1a15d0cee2d5d17cee1f5e2d1f2e5a2f4f # v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: TabQuest_v${{ steps.version.outputs.value }}_edge_build.zip
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_CLIENT_SECRET }}

      - name: Publish Summary
        if: always()
        run: |
          echo "## 🚀 Publishing Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Store | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox | ${{ steps.publish-firefox.outcome == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Chrome | ${{ steps.publish-chrome.outcome == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Edge | ${{ steps.publish-edge.outcome == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.publish-firefox.outcome }}" != "success" || "${{ steps.publish-chrome.outcome }}" != "success" || "${{ steps.publish-edge.outcome }}" != "success" ]]; then
            echo "::error::One or more publishing steps failed. Check the logs above for details."
            exit 1
          fi
