name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '*-v*'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to confirm publishing to browser stores'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Chrome package
        run: pnpm build:chrome

      - name: Package Chrome ZIP
        run: |
          mkdir -p release-assets/chrome
          cp -r dist/* release-assets/chrome/
          cd release-assets/chrome
          zip -r "../../TabQuest_v${{ steps.version.outputs.value }}_chrome_build.zip" .

      - name: Build Firefox package
        run: pnpm build:firefox

      - name: Package Firefox ZIP
        run: |
          mkdir -p release-assets/firefox
          cp -r dist/* release-assets/firefox/
          # Custom removal logic for Firefox if needed
          cd release-assets/firefox
          zip -r "../../TabQuest_v${{ steps.version.outputs.value }}_firefox_build.zip" .

      - name: Build Edge package
        run: pnpm build:edge

      - name: Package Edge ZIP
        run: |
          mkdir -p release-assets/edge
          cp -r dist/* release-assets/edge/
          cd release-assets/edge
          zip -r "../../TabQuest_v${{ steps.version.outputs.value }}_edge_build.zip" .

      - name: Package Source Code (for Firefox review)
        run: |
          zip -r "TabQuest_v${{ steps.version.outputs.value }}_source.zip" . -x "node_modules/*" ".git/*" "dist/*" "release-assets/*" "*.zip" ".vscode/*" ".editorconfig" ".gitignore"

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
          artifacts: |
            TabQuest_v${{ steps.version.outputs.value }}_chrome_build.zip
            TabQuest_v${{ steps.version.outputs.value }}_firefox_build.zip
            TabQuest_v${{ steps.version.outputs.value }}_edge_build.zip
            TabQuest_v${{ steps.version.outputs.value }}_source.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      # Firefox Publishing
      - name: Publish to Firefox Add-ons
        id: publish-firefox
        if: github.event_name == 'push' || github.event.inputs.confirm == 'release'
        run: |
          npx web-ext sign \
            --channel listed \
            --source-dir ./release-assets/firefox \
            --upload-source-code TabQuest_v${{ steps.version.outputs.value }}_source.zip \
            --artifacts-dir ./release-assets/firefox-signed \
            --api-key "${{ secrets.FIREFOX_ISSUER }}" \
            --api-secret "${{ secrets.FIREFOX_SECRET }}"
        env:
          WEB_EXT_API_KEY: ${{ secrets.FIREFOX_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.FIREFOX_SECRET }}
        continue-on-error: true

      # Chrome Publishing
      - name: Publish to Chrome Web Store
        id: publish-chrome
        if: github.event_name == 'push' || github.event.inputs.confirm == 'release'
        uses: wdzeng/chrome-extension@v1
        with:
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          zip-path: TabQuest_v${{ steps.version.outputs.value }}_chrome_build.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
        continue-on-error: true

      # Edge Publishing
      - name: Publish to Edge Add-ons
        id: publish-edge
        if: github.event_name == 'push' || github.event.inputs.confirm == 'release'
        uses: wdzeng/edge-addon@v1
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: TabQuest_v${{ steps.version.outputs.value }}_edge_build.zip
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_CLIENT_SECRET }}
        continue-on-error: true

      # Publishing Summary
      - name: Publish Summary
        if: always()
        run: |
          echo "## 🚀 Publishing Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Store | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox | ${{ steps.publish-firefox.outcome == 'success' && '✅ Success' || steps.publish-firefox.outcome == 'skipped' && '⊘ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Chrome | ${{ steps.publish-chrome.outcome == 'success' && '✅ Success' || steps.publish-chrome.outcome == 'skipped' && '⊘ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Edge | ${{ steps.publish-edge.outcome == 'success' && '✅ Success' || steps.publish-edge.outcome == 'skipped' && '⊘ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          
          # Show which stores had errors
          if [[ "${{ steps.publish-firefox.outcome }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Firefox publishing failed** - Check logs above for details" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.publish-chrome.outcome }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Chrome publishing failed** - Check logs above for details" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.publish-edge.outcome }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Edge publishing failed** - Check logs above for details" >> $GITHUB_STEP_SUMMARY
          fi
