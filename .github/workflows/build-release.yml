name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Chrome package
        run: pnpm build:chrome

      - name: Package Chrome ZIP
        run: |
          mkdir -p release-assets/chrome
          cp -r dist/* release-assets/chrome/
          cd release-assets/chrome
          zip -r "../../TabQuest_v${{ steps.version.outputs.value }}_chrome_build.zip" .

      - name: Build Firefox/Edge package
        run: pnpm build:firefox_edge

      - name: Package Firefox and Edge ZIPs
        run: |
          mkdir -p release-assets/firefox
          mkdir -p release-assets/edge
          cp -r dist/* release-assets/firefox/
          cp -r dist/* release-assets/edge/

          # Following legacy removal logic from original release.yml
          rm -f release-assets/firefox/manifest.json release-assets/firefox/background.js
          rm -f release-assets/edge/manifest.json release-assets/edge/background.js

          cd release-assets/firefox
          zip -r "../../TabQuest_v${{ steps.version.outputs.value }}_firefox_build.zip" .
          
          cd ../../
          cd release-assets/edge
          zip -r "../../TabQuest_v${{ steps.version.outputs.value }}_edge_build.zip" .

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
          artifacts: |
            TabQuest_v${{ steps.version.outputs.value }}_chrome_build.zip
            TabQuest_v${{ steps.version.outputs.value }}_firefox_build.zip
            TabQuest_v${{ steps.version.outputs.value }}_edge_build.zip
          token: ${{ secrets.GITHUB_TOKEN }}
